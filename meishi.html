<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>うちの番頭 名刺・裏面（QR）</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tabler-icons/3.31.0/tabler-icons.min.css" />
<style>
  :root{--navy:#16314f;--accent:#e8913a;--ink:#1c2530;--mut:#5c6b7a;--line:#e6eaef;}
  *{box-sizing:border-box;margin:0;padding:0;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
  body{font-family:"Noto Sans JP",system-ui,sans-serif;background:#eef2f7;color:var(--ink);display:flex;flex-direction:column;align-items:center;gap:18px;padding:30px;}
  .hint{font-size:13px;color:var(--mut);max-width:380px;text-align:center;line-height:1.7;}
  /* 名刺サイズ 91×55mm */
  .card{width:91mm;height:55mm;background:#fff;border:1px solid var(--line);border-radius:3mm;overflow:hidden;display:flex;box-shadow:0 6px 20px -8px rgba(22,49,79,.35);}
  .left{flex:1;background:var(--navy);color:#fff;padding:6mm 5mm;display:flex;flex-direction:column;justify-content:space-between;}
  .left .logo{display:flex;align-items:center;gap:2mm;font-weight:900;font-size:18px;}
  .left .logo .mk{width:8mm;height:8mm;border-radius:2mm;background:#fff;color:var(--navy);display:grid;place-items:center;font-size:16px;}
  .left .cat{font-size:9px;color:#bcd0e6;margin-top:1.5mm;letter-spacing:.3px;}
  .left .tag{font-size:13px;font-weight:700;line-height:1.5;}
  .left .tag .hl{color:var(--accent);}
  .left .contact{font-size:8.5px;color:#cdddee;line-height:1.7;}
  .right{width:36mm;background:#fffaf3;border-left:1px dashed var(--accent);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:3mm;text-align:center;}
  .right .qr{width:25mm;height:25mm;}
  .right .qr svg{width:100%;height:100%;display:block;}
  .right .scan{font-size:9px;font-weight:900;color:var(--navy);margin-top:1.5mm;display:flex;align-items:center;gap:1mm;}
  .right .sub{font-size:7.5px;color:var(--mut);margin-top:.5mm;line-height:1.4;}
  .printbar button{background:var(--accent);color:#fff;border:none;font-weight:700;font-size:14px;padding:11px 22px;border-radius:10px;cursor:pointer;font-family:inherit;}
  @media print{body{background:#fff;padding:0;}.hint,.printbar{display:none;}.card{box-shadow:none;border:none;}@page{margin:8mm;}}
</style>
</head>
<body>
  <div class="hint">名刺の<b>裏面</b>デザインです。「印刷/PDF」で保存して、印刷業者に渡せます（91×55mm）。表面はいつもの名刺のままでOK。</div>
  <div class="card">
    <div class="left">
      <div>
        <div class="logo"><span class="mk"><i class="ti ti-shield-check"></i></span>うちの番頭</div>
        <div class="cat">小さな工務店のための業務システム</div>
      </div>
      <div class="tag">あなたの代わりに、<br><span class="hl">AIが働きます。</span></div>
      <div class="contact">株式会社シバサンホーム<br>0120-154-483 ／ yasuhiro@shibasun.jp</div>
    </div>

m1 0h1m2 0h1m1 0h1m2 0h1m1 0h1m1 0h1m1 0h2m3 0h1"/></svg></div>
      <div class="scan"><i class="ti ti-device-mobile"></i> スマホで体験</div>
      <div class="sub">QRをかざすと<br>その場で触れます</div>
    </div>
  </div>
  <div class="printbar"><button onclick="window.print()"><i class="ti ti-printer"></i> 印刷 / PDF保存</button></div>
</body>
</html>
